# Cloudflare Tunnel Configuration Template
# Save this as: config.yml
# Location: ~/.cloudflared/config.yml (Linux/Mac) or C:\Users\YourName\.cloudflared\config.yml (Windows)

# ============================================================================
# IMPORTANT: Replace these values with your actual values
# ============================================================================
# 1. Replace YOUR-TUNNEL-UUID with the UUID from: cloudflared tunnel create whatsapp-bot
# 2. Replace /path/to/credentials with actual path to your .json file
# 3. Replace bot.yourdomain.com with your actual subdomain

tunnel: YOUR-TUNNEL-UUID
credentials-file: /home/youruser/.cloudflared/YOUR-TUNNEL-UUID.json

# Ingress rules (order matters!)
ingress:
  # Route bot.yourdomain.com to local webhook server
  - hostname: bot.yourdomain.com
    service: http://localhost:3000
  
  # Catch-all rule (required - must be last)
  - service: http_status:404

# Optional: Logging configuration
# loglevel: info

# ============================================================================
# PATH EXAMPLES FOR DIFFERENT OPERATING SYSTEMS
# ============================================================================

# Linux:
# credentials-file: /home/youruser/.cloudflared/UUID.json

# macOS:
# credentials-file: /Users/youruser/.cloudflared/UUID.json

# Windows:
# credentials-file: C:\Users\YourName\.cloudflared\UUID.json

# ============================================================================
# MULTIPLE HOSTNAMES (if needed in future)
# ============================================================================

# Example: Route multiple subdomains to different local ports
# ingress:
#   - hostname: bot.yourdomain.com
#     service: http://localhost:3000
#   - hostname: admin.yourdomain.com
#     service: http://localhost:8080
#   - service: http_status:404

# ============================================================================
# VALIDATION
# ============================================================================
# Test your config with: cloudflared tunnel ingress validate
